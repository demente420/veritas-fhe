[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
via_ir = true
optimizer = true
optimizer_runs = 200
remappings = [
  "@fhevm/=lib/fhevm/library-solidity/",
  "encrypted-types/=lib/fhevm/library-solidity/node_modules/encrypted-types/",
  "@openzeppelin/=lib/fhevm/library-solidity/node_modules/@openzeppelin/",
  "forge-std/=lib/forge-std/src/"
]
